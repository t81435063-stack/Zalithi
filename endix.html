<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لغة ذيلي</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a12;
    --surface: #11111e;
    --card: #16162a;
    --glow: #7c4dff;
    --accent: #ff4d8d;
    --gold: #ffd54f;
    --text: #e8e0ff;
    --muted: #7b7a9e;
    --border: rgba(124, 77, 255, 0.25);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Cairo', sans-serif;
    min-height: 100vh;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 20% 30%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 80% 10%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 50% 70%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(2px 2px at 60% 20%, rgba(124,77,255,0.7) 0%, transparent 100%),
      radial-gradient(2px 2px at 15% 85%, rgba(255,77,141,0.5) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }
  .container {
    position: relative;
    z-index: 1;
    max-width: 860px;
    margin: 0 auto;
    padding: 20px;
  }
  header { text-align: center; padding: 40px 20px 20px; }
  .lang-badge {
    display: inline-block;
    background: linear-gradient(135deg, var(--glow), var(--accent));
    color: white;
    font-size: 11px;
    letter-spacing: 3px;
    padding: 6px 18px;
    border-radius: 20px;
    margin-bottom: 16px;
    font-weight: 600;
  }
  h1 {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(30px, 7vw, 68px);
    background: linear-gradient(135deg, #b39dff 0%, var(--accent) 50%, var(--gold) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.1;
    margin-bottom: 8px;
    filter: drop-shadow(0 0 30px rgba(124,77,255,0.5));
  }
  .subtitle { color: var(--muted); font-size: 14px; margin-bottom: 6px; }
  .script-sample {
    font-family: 'Cinzel Decorative', serif;
    font-size: 18px;
    color: var(--gold);
    letter-spacing: 6px;
    opacity: 0.7;
    animation: pulse 3s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:.5} 50%{opacity:.9} }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px;
    margin: 20px 0;
    box-shadow: 0 0 60px rgba(124,77,255,0.08);
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    top: -1px; left: 15%; right: 15%;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--glow), var(--accent), transparent);
  }
  .card-title {
    font-family: 'Cinzel Decorative', serif;
    font-size: 18px;
    color: var(--gold);
    margin-bottom: 20px;
    text-align: center;
  }
  .input-label {
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 8px;
    display: block;
  }
  textarea {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-family: 'Cairo', sans-serif;
    font-size: 22px;
    padding: 16px;
    resize: none;
    outline: none;
    transition: border-color 0.3s, box-shadow 0.3s;
    min-height: 80px;
  }
  textarea:focus {
    border-color: var(--glow);
    box-shadow: 0 0 20px rgba(124,77,255,0.2);
  }
  .translate-btn {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, var(--glow), var(--accent));
    border: none;
    border-radius: 12px;
    color: white;
    font-family: 'Cairo', sans-serif;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.3s;
    margin: 14px 0;
  }
  .translate-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(124,77,255,0.5); }
  .translate-btn:active { transform: translateY(0); }

  /* Character pairs */
  .char-display {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: flex-end;
    margin-bottom: 16px;
  }
  .char-pair {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    background: rgba(124,77,255,0.1);
    border: 1px solid rgba(124,77,255,0.2);
    border-radius: 10px;
    padding: 8px 10px;
    min-width: 44px;
    animation: fadeIn 0.3s ease forwards;
    opacity: 0;
  }
  .char-space-divider {
    width: 2px;
    height: 50px;
    background: rgba(124,77,255,0.2);
    border-radius: 2px;
    align-self: center;
    margin: 0 4px;
  }
  @keyframes fadeIn { to { opacity: 1; transform: translateY(0); } from { opacity: 0; transform: translateY(6px); } }

  .full-zhayli-text {
    font-family: 'Cinzel Decorative', serif;
    font-size: 20px;
    color: var(--accent);
    letter-spacing: 2px;
    text-align: center;
    padding: 16px;
    background: rgba(255,77,141,0.07);
    border-radius: 10px;
    word-break: break-all;
    line-height: 1.7;
  }
  .copy-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 8px 16px;
    border-radius: 8px;
    cursor: pointer;
    font-family: 'Cairo', sans-serif;
    font-size: 12px;
    transition: all 0.3s;
    margin-top: 12px;
    display: block;
    width: fit-content;
    margin-left: auto;
  }
  .copy-btn:hover { border-color: var(--gold); color: var(--gold); }

  /* Alphabet grid */
  .alpha-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(72px, 1fr));
    gap: 8px;
  }
  .alpha-cell {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 6px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    user-select: none;
  }
  .alpha-cell:hover {
    border-color: var(--glow);
    transform: translateY(-3px);
    box-shadow: 0 6px 20px rgba(124,77,255,0.25);
    background: rgba(124,77,255,0.1);
  }
  .alpha-cell:active { transform: translateY(0); }
  .alpha-ar { font-size: 20px; color: var(--text); margin-bottom: 3px; }
  .alpha-zh { font-family: 'Cinzel Decorative', serif; font-size: 12px; color: var(--gold); letter-spacing: 1px; }
  .alpha-name { font-size: 9px; color: var(--muted); margin-top: 2px; }

  .section-note {
    font-size: 12px;
    color: var(--muted);
    text-align: center;
    margin-bottom: 16px;
    letter-spacing: 1px;
  }

  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: linear-gradient(135deg, var(--glow), var(--accent));
    color: white;
    padding: 12px 25px;
    border-radius: 30px;
    font-size: 14px;
    font-weight: 600;
    z-index: 999;
    transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  footer {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
    font-size: 11px;
    letter-spacing: 2px;
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="lang-badge">✦ أبجدية خاصة ✦</div>
    <h1>ZHAYLI</h1>
    <p class="subtitle">لغة ذيلي — كل حرف عربي له حرف خاص</p>
    <div class="script-sample">Zh · Hq · Mv · Dh · Hz</div>
  </header>

  <div class="card">
    <div class="card-title">✦ المترجم ✦</div>
    <span class="input-label">اكتب أي اسم أو كلمة بالعربي</span>
    <textarea id="inputText" placeholder="مثلاً: حماده، محمد، الكويت..."></textarea>
    <button class="translate-btn" id="translateBtn">✦ حوّل لحروف ذيلي ✦</button>

    <div id="resultArea" style="display:none;">
      <span class="input-label" style="margin-bottom:12px;">النتيجة حرف بحرف</span>
      <div class="char-display" id="charDisplay"></div>
      <span class="input-label" style="margin-bottom:8px;">الكلمة كاملة بذيلي</span>
      <div class="full-zhayli-text" id="fullText"></div>
      <button class="copy-btn" id="copyBtn">📋 نسخ</button>
    </div>
  </div>

  <div class="card">
    <div class="card-title">📖 أبجدية ذيلي</div>
    <p class="section-note">اضغط على أي حرف لإضافته للمدخل</p>
    <div class="alpha-grid" id="alphaGrid"></div>
  </div>

  <footer>✦ ZHAYLI · لغة ذيلي · أبجدية من عالم آخر ✦</footer>
</div>
<div class="toast" id="toast"></div>

<script>
var alphabetMap = {
  'ا': { zh: 'Zh', name: 'Zhaa' },
  'أ': { zh: 'Zh', name: 'Zhaa' },
  'إ': { zh: 'Zh', name: 'Zhii' },
  'آ': { zh: 'Zh', name: 'Zhaa' },
  'ب': { zh: 'Bv', name: 'Bvii' },
  'ت': { zh: 'Ty', name: 'Tyaa' },
  'ث': { zh: 'Xh', name: 'Xhii' },
  'ج': { zh: 'Jl', name: 'Jlaa' },
  'ح': { zh: 'Hq', name: 'Hqii' },
  'خ': { zh: 'Kh', name: 'Khaa' },
  'د': { zh: 'Dh', name: 'Dhii' },
  'ذ': { zh: 'Dz', name: 'Dzaa' },
  'ر': { zh: 'Rv', name: 'Rvii' },
  'ز': { zh: 'Zl', name: 'Zlaa' },
  'س': { zh: 'Sv', name: 'Svii' },
  'ش': { zh: 'Sh', name: 'Shaa' },
  'ص': { zh: 'Sq', name: 'Sqii' },
  'ض': { zh: 'Dq', name: 'Dqaa' },
  'ط': { zh: 'Tw', name: 'Twii' },
  'ظ': { zh: 'Zw', name: 'Zwaa' },
  'ع': { zh: 'Vr', name: 'Vraa' },
  'غ': { zh: 'Gh', name: 'Ghii' },
  'ف': { zh: 'Fv', name: 'Fvii' },
  'ق': { zh: 'Qn', name: 'Qnaa' },
  'ك': { zh: 'Kl', name: 'Klii' },
  'ل': { zh: 'Lv', name: 'Lvaa' },
  'م': { zh: 'Mv', name: 'Mvii' },
  'ن': { zh: 'Nz', name: 'Nzaa' },
  'ه': { zh: 'Hz', name: 'Hzii' },
  'و': { zh: 'Wv', name: 'Wvaa' },
  'ي': { zh: 'Yl', name: 'Ylii' },
  'ى': { zh: 'Yl', name: 'Ylaa' },
  'ة': { zh: 'Ty', name: 'Tyh' },
  'ئ': { zh: 'Yl', name: 'Ylii' },
  'ء': { zh: 'Aq', name: 'Aqaa' },
  'ؤ': { zh: 'Wv', name: 'Wvaa' },
  'ال': { zh: 'Zh', name: 'Al' }
};

function removeTashkeel(text) {
  return text.replace(/[\u064B-\u065F\u0640]/g, '');
}

function runTranslate() {
  var raw = document.getElementById('inputText').value;
  var text = removeTashkeel(raw).trim();
  if (!text) { showToast('اكتب شيء أول!'); return; }

  var charDisplay = document.getElementById('charDisplay');
  var fullText = document.getElementById('fullText');
  var resultArea = document.getElementById('resultArea');

  charDisplay.innerHTML = '';
  var fullResult = '';
  var delay = 0;

  var words = text.split(' ');
  for (var w = 0; w < words.length; w++) {
    var word = words[w];
    if (w > 0) {
      // Space divider
      var sp = document.createElement('div');
      sp.className = 'char-space-divider';
      charDisplay.appendChild(sp);
      fullResult += ' ';
    }
    for (var i = 0; i < word.length; i++) {
      var ch = word[i];
      var mapped = alphabetMap[ch];
      var zhChar = mapped ? mapped.zh : ch;
      fullResult += zhChar;

      var pair = document.createElement('div');
      pair.className = 'char-pair';
      pair.style.animationDelay = delay + 's';
      delay += 0.06;

      var arDiv = document.createElement('div');
      arDiv.style.cssText = 'font-size:20px;color:#7b7a9e;font-family:Cairo,sans-serif;font-weight:600';
      arDiv.textContent = ch;

      var zhDiv = document.createElement('div');
      zhDiv.style.cssText = 'font-family:"Cinzel Decorative",serif;font-size:13px;color:#ffd54f;letter-spacing:1px';
      zhDiv.textContent = zhChar;

      pair.appendChild(arDiv);
      pair.appendChild(zhDiv);
      charDisplay.appendChild(pair);
    }
  }

  fullText.textContent = fullResult;
  resultArea.style.display = 'block';
  resultArea.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function buildAlphaGrid() {
  var grid = document.getElementById('alphaGrid');
  // Only show unique chars (skip duplicates like أ إ آ)
  var shown = {};
  var entries = Object.entries(alphabetMap);
  for (var i = 0; i < entries.length; i++) {
    var ar = entries[i][0];
    var data = entries[i][1];
    if (ar.length > 1) continue; // skip 'ال'
    var key = ar + data.zh;
    if (shown[key]) continue;
    shown[key] = true;

    (function(arChar, zhData) {
      var cell = document.createElement('div');
      cell.className = 'alpha-cell';
      cell.innerHTML =
        '<div class="alpha-ar">' + arChar + '</div>' +
        '<div class="alpha-zh">' + zhData.zh + '</div>' +
        '<div class="alpha-name">' + zhData.name + '</div>';
      cell.addEventListener('click', function() {
        var inp = document.getElementById('inputText');
        inp.value += arChar;
        inp.focus();
      });
      grid.appendChild(cell);
    })(ar, data);
  }
}

document.getElementById('translateBtn').addEventListener('click', runTranslate);

document.getElementById('inputText').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    runTranslate();
  }
});

document.getElementById('copyBtn').addEventListener('click', function() {
  var text = document.getElementById('fullText').textContent;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(function() { showToast('تم النسخ!'); });
  } else {
    showToast('النسخ غير متاح');
  }
});

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 2500);
}

buildAlphaGrid();
</script>
</body>
</html>
